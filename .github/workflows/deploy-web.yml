name: Deploy Moments web to GitHub Pages

# Builds the Expo web bundle and publishes it to GitHub Pages so the
# app is playable at https://<owner>.github.io/AYSER-s-CV/
# One-time setup: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions".

on:
  push:
    branches:
      - claude/moments-refactor-architecture-w7zjt4
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export web bundle
        run: npx expo export --platform web --output-dir dist
      - name: Disable Jekyll (keep _expo folder)
        run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
